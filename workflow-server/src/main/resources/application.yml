server:
  port: 8088

spring:
  application:
    name: workflow-server
  
  datasource:
    url: jdbc:mysql://localhost:3306/workflow?serverTimezone=UTC&allowMultiQueries=true&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: zhoudawei
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    sql-migration-prefix: V
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    baseline-on-migrate: true
    baseline-version: 0

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.workflow.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Flowable 配置
flowable:
  database-schema-update: false
  async-executor-activate: true
  history-level: full
  db-history-used: true

# 日志配置
logging:
  file:
    name: logs/workflow-server.log
  level:
    root: INFO
    com.workflow: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
