services:
  mysql:
    image: mysql:8.4
    container_name: flow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-workflow}
      MYSQL_DATABASE: ${DB_NAME:-workflow}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-workflow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./workflow-server
    container_name: flow-server
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-workflow}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-workflow}?serverTimezone=Asia/Shanghai&allowMultiQueries=true&useUnicode=true&characterEncoding=utf-8&connectionCollation=utf8mb4_unicode_ci&nullCatalogMeansCurrent=true
      SERVER_PORT: 8080
      FLOWABLE_SCHEMA_UPDATE: ${FLOWABLE_SCHEMA_UPDATE:-true}
      FILE_STORAGE_PATH: /app/uploads
      FILE_STORAGE_ACCESS_URL: /uploads
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./workflow-web
    container_name: flow-web
    depends_on:
      - server
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  mysql-data:
  uploads:
