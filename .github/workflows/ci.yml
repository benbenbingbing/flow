name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - codex/**

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflow-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Test
        run: mvn test

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workflow-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: workflow-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit Test
        run: npm run test:unit

      - name: Build
        run: npm run build
